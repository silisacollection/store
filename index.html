<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silsila Clothing and Accessories</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-rose-50 via-white to-pink-50">
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const { useEffect, useMemo, useState } = React;
      const API_URL = "https://script.google.com/macros/s/AKfycbyjq_5krOWwbv3Su58cwuNvpkwsF06bAztxRE8NJgkrIMGbeTT-q45V5cJzAIIV6KcvPw/exec";

      const [products, setProducts] = useState([]);
      const [cart, setCart] = useState([]);
      const [checkout, setCheckout] = useState({
        customer: "",
        phone: "",
        address: "",
        email: "",
        
 
      });
      const [orderResult, setOrderResult] = useState(null);
      const [loading, setLoading] = useState(true);
const [search, setSearch] = useState("");
const [selectedCategory, setSelectedCategory] = useState("All");
const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedImageIndex, setSelectedImageIndex] = useState(0);  
const [imageIndexes, setImageIndexes] = useState({});
      
const LOGO_URL = "./logo.png";

      useEffect(() => {
        fetch(`${API_URL}?action=products`)
          .then((r) => r.json())
          .then((data) => setProducts(data || []))
          .finally(() => setLoading(false));
      }, []);

useEffect(() => {
  if (!products.length) return;

  const interval = setInterval(() => {
    setImageIndexes((prev) => {
      const updated = { ...prev };

      products.forEach((product) => {
        const totalImages = product.images?.length || 1;
        updated[product.product_id] =
          ((prev[product.product_id] || 0) + 1) % totalImages;
      });

      return updated;
    });
  }, 2000);

  return () => clearInterval(interval);
}, [products]);

      const addToCart = (product) => {
        setCart((prev) => {
          const existing = prev.find((p) => p.product_id === product.product_id);
          if (existing) {
            return prev.map((p) =>
              p.product_id === product.product_id ? { ...p, qty: p.qty + 1 } : p
            );
          }
          return [...prev, { ...product, qty: 1 }];
        });
      };

      const updateQty = (id, qty) => {
        if (qty <= 0) {
          setCart((prev) => prev.filter((p) => p.product_id !== id));
          return;
        }
        setCart((prev) =>
          prev.map((p) => (p.product_id === id ? { ...p, qty } : p))
        );
      };

      const subtotal = useMemo(
        () => cart.reduce((sum, item) => sum + item.price * item.qty, 0),
        [cart]
      );

     const categories = ["All", ...new Set(products.map(p => p.category || "Unstitched"))];
      const categoryImageMap = useMemo(() => {
  const map = {};

  products.forEach((product) => {
    const cat = product.category || "Unstitched";

    if (!map[cat] && product.images?.length) {
      map[cat] = product.images[0];
    }
  });

  return map;
}, [products]);

const filteredProducts = products.filter((p) => {
  const matchSearch = p.name.toLowerCase().includes(search.toLowerCase());
  const matchCategory =
    selectedCategory === "All" ||
    (p.category || "") === selectedCategory;

  return matchSearch && matchCategory;
});

const delivery = cart.length ? 250 : 0;
      const total = subtotal + delivery;

const placeOrder = async () => {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action: "placeOrder",
        ...checkout,
        items: cart.map((item) => ({
          product_id: item.product_id,
          qty: item.qty,
        })),
      }),
      redirect: "follow"
    });

    const data = await res.json();

    if (!data.success) {
      alert(data.error || "Order failed");
      return;
    }

    setOrderResult(data);
    setCart([]);
  } catch (error) {
    alert("Error placing order: " + error.message);
    console.error(error);
  }
};

      if (orderResult?.success) {
        return (
          <div className="min-h-screen flex items-center justify-center p-8">
            <div className="bg-white shadow-lg rounded-3xl p-10 text-center max-w-lg">
              <h1 className="text-3xl font-bold">Order Confirmed 🎉</h1>
              <p className="mt-4">Order Number</p>
              <p className="text-2xl font-semibold mt-2">{orderResult.orderNo}</p>
            </div>
          </div>
        );
      }

      return (
        <div>
<header className="bg-white shadow-sm sticky top-0 z-20">
  <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    
    <div className="flex items-center gap-3">
      <img
        src={LOGO_URL}
        alt="Silsila Logo"
        className="w-12 h-12 rounded-full object-cover"
      />
      <h1 className="text-2xl font-bold">Silsila Clothing and Accessories</h1>
    </div>

    <div className="flex items-center gap-4">
      <input
        value={search}
        onChange={(e) => setSearch(e.target.value)}
        placeholder="Search dresses..."
        className="border rounded-full px-4 py-2"
      />
      <button
  onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
  className="relative text-2xl"
>
  🛒
  {cart.length > 0 && (
    <span className="absolute -top-2 -right-2 bg-rose-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">
      {cart.length}
    </span>
  )}
</button>
    </div>

  </div>
</header>

          <main className="max-w-7xl mx-auto px-6 py-10 grid lg:grid-cols-3 gap-8">
            <section className="lg:col-span-2">
              <h2 className="text-4xl font-bold mb-6">Premium Unstitched Collection</h2>

<div className="flex gap-6 overflow-x-auto pb-4 mb-8">
  {categories.map((cat) => (
    <div
      key={cat}
      onClick={() => setSelectedCategory(cat)}
      className="flex flex-col items-center cursor-pointer min-w-fit"
    >
      <img
        src={
          cat === "All"
            ? "https://placehold.co/100x100?text=All"
            : categoryImageMap[cat] || "https://placehold.co/100x100"
        }
        alt={cat}
        className={`w-24 h-24 rounded-full object-cover border-4 shadow-lg hover:scale-110 transition duration-300 ${
          selectedCategory === cat
            ? "border-rose-600 scale-110"
            : "border-white"
        }`}
      />

      <span className="mt-2 text-sm font-semibold whitespace-nowrap">
        {cat}
      </span>
    </div>
  ))}
</div>
              {loading ? <p>Loading...</p> : (
                <div className="grid md:grid-cols-2 gap-6">
                  {filteredProducts.map((product) => (
                    <div
  key={product.product_id}
  onClick={() => {
  setSelectedProduct(product);
  setSelectedImageIndex(0);
}}
  className="bg-white rounded-3xl shadow-sm overflow-hidden cursor-pointer hover:shadow-xl transition"
>
                      <img
                        src={
  product.images?.[imageIndexes[product.product_id] || 0] ||
  "https://placehold.co/600x600"
}
                        className="w-full h-72 object-cover"
                      />
                      <div className="p-6">
                        <h3 className="text-xl font-semibold">{product.name}</h3>
                        <p className="text-neutral-500">Stock: {product.stock}</p>
                        <p className="text-2xl font-bold mt-3">Rs {product.price}</p>

                        <button
                          onClick={() => addToCart(product)}
                          className="w-full mt-4 bg-gradient-to-r from-rose-500 to-pink-600 py-3 rounded-2xl"
                        >
                          Add to Cart
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </section>

            <aside>
              <div className="bg-white rounded-3xl shadow-sm p-6 sticky top-24">
                <h3 className="text-2xl font-semibold mb-4">Checkout</h3>

                {cart.map((item) => (
                  <div key={item.product_id} className="border-b py-3">
                    <div className="flex justify-between">
                      <span>{item.name}</span>
                      <span>Rs {item.price * item.qty}</span>
                    </div>
                    <div className="flex gap-2 mt-2">
                      <button className="border px-3 rounded" onClick={() => updateQty(item.product_id, item.qty - 1)}>-</button>
                      <span>{item.qty}</span>
                      <button className="border px-3 rounded" onClick={() => updateQty(item.product_id, item.qty + 1)}>+</button>
                    </div>
                  </div>
                ))}

                <div className="mt-4 space-y-2">
                  <div className="flex justify-between"><span>Subtotal</span><span>Rs {subtotal}</span></div>
                  <div className="flex justify-between"><span>Delivery</span><span>Rs {delivery}</span></div>
                  <div className="flex justify-between font-bold"><span>Total</span><span>Rs {total}</span></div>
                </div>

                <div className="mt-6 space-y-3">
                  <input className="w-full border rounded-2xl p-3" placeholder="Customer Name"
                    onChange={(e) => setCheckout({...checkout, customer: e.target.value})} />
<input
  className="w-full border rounded-2xl p-3"
  placeholder="03XXXXXXXXX"
  value={checkout.phone}
  onChange={(e) =>
    setCheckout({ ...checkout, phone: e.target.value })
  }
/>
                  <input className="w-full border rounded-2xl p-3" placeholder="Email"
                    onChange={(e) => setCheckout({...checkout, email: e.target.value})} />
                  
                  <textarea className="w-full border rounded-2xl p-3" rows="4" placeholder="Address"
                    onChange={(e) => setCheckout({...checkout, address: e.target.value})}></textarea>
                  <button
                    disabled={!cart.length}
                    onClick={placeOrder}
                    className="w-full bg-gradient-to-r from-rose-500 to-pink-600 py-3 rounded-2xl disabled:opacity-50"
                  >
                    Place Order
                  </button>
                </div>
              </div>
            </aside>
            {selectedProduct && (
  <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    <div className="bg-white rounded-3xl max-w-4xl w-full grid md:grid-cols-2 overflow-hidden relative">
      
      <button
        onClick={() => setSelectedProduct(null)}
        className="absolute top-4 right-4 text-2xl"
      >
        ×
      </button>

<div className="p-4">
  <img
    src={
      selectedProduct.images?.[selectedImageIndex] ||
      "https://placehold.co/800x1000"
    }
    className="w-full h-[500px] object-cover rounded-2xl"
  />

  <div className="flex gap-3 mt-4 overflow-x-auto">
    {selectedProduct.images?.map((img, index) => (
      <img
        key={index}
        src={img}
        onClick={() => setSelectedImageIndex(index)}
        className={`w-20 h-20 rounded-xl object-cover cursor-pointer border-2 ${
          selectedImageIndex === index
            ? "border-black"
            : "border-transparent"
        }`}
      />
    ))}
  </div>
</div>

      <div className="p-8 flex flex-col justify-between">
        <div>
          <h2 className="text-3xl font-bold">{selectedProduct.name}</h2>
          <p className="text-neutral-500 mt-2">
            Premium unstitched fabric with elegant finish and original quality.
          </p>

          <p className="text-3xl font-bold mt-6">
            Rs {selectedProduct.price}
          </p>

          <p className="mt-3 text-sm text-neutral-500">
            Stock: {selectedProduct.stock}
          </p>
        </div>
                        <div className="flex items-center gap-4 mt-6">
  <button
    onClick={() =>
      setSelectedProduct({
        ...selectedProduct,
        qty: Math.max(1, (selectedProduct.qty || 1) - 1),
      })
    }
    className="border px-4 py-2 rounded-xl"
  >
    -
  </button>

  <span className="text-xl font-semibold">
    {selectedProduct.qty || 1}
  </span>

  <button
    onClick={() =>
      setSelectedProduct({
        ...selectedProduct,
        qty: (selectedProduct.qty || 1) + 1,
      })
    }
    className="border px-4 py-2 rounded-xl"
  >
    +
  </button>
</div>
        <button
          onClick={() => {
            for (let i = 0; i < (selectedProduct.qty || 1); i++) {
  addToCart(selectedProduct);
}
            setSelectedProduct(null);
          }}
          className="mt-8 bg-gradient-to-r from-rose-500 to-pink-600 py-4 rounded-2xl text-lg"
        >
        
          Add to Cart
        </button>

<button
  onClick={async () => {
    const phone = prompt("Enter your WhatsApp number");

    if (!phone) return;

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        action: "whatsappInquiry",
        customer: checkout.customer || "Website Visitor",
        phone,
        product: selectedProduct.name,
        price: selectedProduct.price
      })
    });

    const data = await res.json();

    if (data.success) {
      alert("Inquiry sent successfully on WhatsApp");
    } else {
      alert(data.error);
    }
  }}
  className="mt-4 border border-black py-3 rounded-2xl"
>
  Ask on WhatsApp
</button>
        
      </div>
    </div>
  </div>
)}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
